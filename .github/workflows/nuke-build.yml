name: Nuke Plugin Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      nuke_versions:
        description: "Comma-separated Nuke minor versions (example: 15.1,16.0)"
        required: false
        default: "13.0,13.1,13.2,14.0,14.1,15.0,15.1,15.2,16.0"
      include_macos:
        description: "Include macOS builds (x86_64 and arm64 when supported)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && format('build-{0}-{1}', github.workflow, github.ref) || format('smoke-{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Checks on ${{ matrix.runner }}
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Python syntax check
        run: python -m compileall TNoise

      - name: Check xtask
        run: cargo check -p xtask

  matrix:
    name: Prepare Release Matrix
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NUKE_VERSIONS: ${{ github.event.inputs.nuke_versions }}
          INPUT_INCLUDE_MACOS: ${{ github.event.inputs.include_macos }}
        run: |
          python - <<'PY'
          import json
          import os

          default_versions = ["13.0", "13.1", "13.2", "14.0", "14.1", "15.0", "15.1", "15.2", "16.0"]

          def parse_versions(raw: str):
              if not raw:
                  return []
              return [v.strip() for v in raw.split(",") if v.strip()]

          def parse_minor(version: str):
              major, minor = version.split(".", 1)
              return (int(major), int(minor))

          event_name = os.getenv("EVENT_NAME", "")
          if event_name == "workflow_dispatch":
              versions = parse_versions(os.getenv("INPUT_NUKE_VERSIONS", "")) or default_versions
              include_macos = os.getenv("INPUT_INCLUDE_MACOS", "true").lower() == "true"
          else:
              versions = default_versions
              include_macos = True

          targets = [
              {
                  "runner": "ubuntu-latest",
                  "target_platform": "linux",
                  "os_name": "linux",
                  "arch_name": "x86_64",
                  "lib_ext": "so",
              },
              {
                  "runner": "windows-latest",
                  "target_platform": "windows",
                  "os_name": "windows",
                  "arch_name": "x86_64",
                  "lib_ext": "dll",
              },
          ]

          include = []
          for version in versions:
              for target in targets:
                  row = dict(target)
                  row["nuke_version"] = version
                  include.append(row)

              if include_macos:
                  # Nuke 15.1 does not ship a valid x86_64 macOS binary (NukeVersionParser
                  # returns an aarch64 binary for that slot), so we skip it.
                  if version != "15.1":
                      include.append(
                          {
                              "runner": "macos-14",
                              "target_platform": "macos-x86-64",
                              "os_name": "macos",
                              "arch_name": "x86_64",
                              "lib_ext": "dylib",
                              "nuke_version": version,
                              "use_zig": "true",
                          }
                      )

                  if parse_minor(version) >= (15, 0):
                      include.append(
                          {
                              "runner": "macos-14",
                              "target_platform": "macos-aarch64",
                              "os_name": "macos",
                              "arch_name": "aarch64",
                              "lib_ext": "dylib",
                              "nuke_version": version,
                          }
                      )

          matrix = {"include": include}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps(matrix)}\n")

          print(json.dumps(matrix))
          PY

  build:
    name: Build Nuke ${{ matrix.nuke_version }} on ${{ matrix.target_platform }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs: matrix
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install 7zip lessmsi -y

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install p7zip

      - name: Install Zig and cargo-zigbuild (macOS x86_64 cross-compile)
        if: matrix.use_zig == 'true'
        run: |
          brew install zig
          cargo install cargo-zigbuild
          rustup target add x86_64-apple-darwin

      - name: Build and package plugin
        env:
          RUST_BACKTRACE: "1"
        run: cargo xtask --compile ${{ matrix.use_zig == 'true' && '--use-zig' || '' }} --nuke-versions "${{ matrix.nuke_version }}" --target-platform "${{ matrix.target_platform }}" --output-to-package --limit-threads

      - name: Verify expected binary exists
        shell: bash
        env:
          NUKE_VERSION: ${{ matrix.nuke_version }}
          OS_NAME: ${{ matrix.os_name }}
          ARCH_NAME: ${{ matrix.arch_name }}
          LIB_EXT: ${{ matrix.lib_ext }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys

          expected = (
              pathlib.Path("TNoise")
              / "bin"
              / os.environ["NUKE_VERSION"]
              / os.environ["OS_NAME"]
              / os.environ["ARCH_NAME"]
              / f"TNoise.{os.environ['LIB_EXT']}"
          )
          if not expected.is_file():
              print(f"Missing expected output: {expected}")
              sys.exit(1)
          print(f"Found: {expected}")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tnoise-${{ matrix.nuke_version }}-${{ matrix.target_platform }}
          if-no-files-found: error
          path: |
            README.md
            docs/INSTALL.md
            docs/NODE_REFERENCE.md
            init.py
            TNoise/*.py
            TNoise/resources/*
            TNoise/bin/${{ matrix.nuke_version }}/${{ matrix.os_name }}/${{ matrix.arch_name }}/TNoise.${{ matrix.lib_ext }}

  bundle:
    name: Bundle Multi-Platform Package
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble package
        run: |
          mkdir -p package
          for artifact in dist/*; do
            rsync -a "$artifact/" package/
          done
          find package -type d -name "__pycache__" -prune -exec rm -rf {} +

      - name: Create zip
        id: zip
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ZIP_NAME="TNoise-${GITHUB_REF_NAME}.zip"
          else
            ZIP_NAME="TNoise-${GITHUB_SHA}.zip"
          fi
          cd package
          zip -r "../${ZIP_NAME}" .
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload bundled artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          if-no-files-found: error
          path: ${{ steps.zip.outputs.zip_name }}

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TNoise ${{ github.ref_name }}
          files: ${{ steps.zip.outputs.zip_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          repository: Tom-Petroni/TNoise
          token: ${{ secrets.RELEASE_TOKEN }}
